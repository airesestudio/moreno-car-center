name: Deploy to Firebase Hosting on PR
'on': pull_request
jobs:
  build_and_preview:
    if: '${{ github.event.pull_request.head.repo.full_name == github.repository }}'
    runs-on: ubuntu-latest
    env:
      VITE_FIREBASE_API_KEY: "AIzaSyAEdUKkEakc3swgf9MdYbkkPSMcv4CKhFY"
      VITE_FIREBASE_AUTH_DOMAIN: "moreno-car-center-stg.firebaseapp.com"
      VITE_FIREBASE_PROJECT_ID: "moreno-car-center-stg"
      VITE_FIREBASE_STORAGE_BUCKET: "moreno-car-center-stg.firebasestorage.app"
      VITE_FIREBASE_MESSAGING_SENDER_ID: "327986348560"
      VITE_FIREBASE_APP_ID: "1:327986348560:web:09ec5ddf51df18027f8095"
      VITE_GTM_ID: "GTM-DEMO123"
      VITE_RESEND_API_KEY: "demo_resend_key"
      VITE_GEMINI_API_KEY: "demo_gemini_key"
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npm run build -- --mode staging
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: moreno-car-center-stg
