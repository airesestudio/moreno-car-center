name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      VITE_FIREBASE_API_KEY: "AIzaSyA7e88Dy2LEbrAiEUFasrBwOsGgDJrHIik"
      VITE_FIREBASE_AUTH_DOMAIN: "moreno-car-center.firebaseapp.com"
      VITE_FIREBASE_PROJECT_ID: "moreno-car-center"
      VITE_FIREBASE_STORAGE_BUCKET: "moreno-car-center.firebasestorage.app"
      VITE_FIREBASE_MESSAGING_SENDER_ID: "971874740388"
      VITE_FIREBASE_APP_ID: "1:971874740388:web:265b5627ea2457dc4d1e31"
      VITE_GTM_ID: "GTM-DEMO123"
      VITE_RESEND_API_KEY: "demo_resend_key"
      VITE_GEMINI_API_KEY: "demo_gemini_key"
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npm run build -- --mode production
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: moreno-car-center
